<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Android adaptive-icon foreground layer.
    Android crops to a system shape and applies parallax, so the visible
    "safe zone" is roughly the central 66% (≈ 672 of 1024). The K is
    re-laid out inside a 660x660 box centered at (512, 512).
  -->
  <g fill="#1C1410" transform="translate(182 182) scale(0.645)">
    <!-- Same paths as icon.svg, just inside the scaled group -->
    <rect x="362" y="600" width="68" height="192" rx="22" ry="22"/>
    <rect x="358" y="592" width="76" height="14" rx="4"/>
    <polygon points="362,592 430,592 410,232 392,232"/>

    <g transform="translate(430 512) rotate(-45.2)">
      <rect x="0" y="-32" width="270" height="64" rx="18" ry="18"/>
      <rect x="266" y="-26" width="22" height="52"/>
      <rect x="288" y="-44" width="22" height="88" rx="4"/>
      <rect x="310" y="-44" width="78" height="22" rx="6"/>
      <rect x="310" y="-11" width="78" height="22" rx="6"/>
      <rect x="310" y="22"  width="78" height="22" rx="6"/>
    </g>

    <g transform="translate(430 512) rotate(45.2)">
      <rect x="0" y="-30" width="268" height="60" rx="16" ry="16"/>
      <ellipse cx="332" cy="0" rx="68" ry="50"/>
    </g>
  </g>
</svg>
